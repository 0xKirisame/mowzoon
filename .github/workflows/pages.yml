name: Deploy UI to GitHub Pages

# Manual for now: enabling Pages needs repo admin. Run it from the Actions
# tab once Pages is switched on (Settings > Pages > Source: GitHub Actions).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: mowzoon-ui
      - run: npm run build -- --base=/mowzoon/
        working-directory: mowzoon-ui
        env:
          VITE_API_URL: https://mowzoon-api.onrender.com
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: mowzoon-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
