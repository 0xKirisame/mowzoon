<svg width="480" height="480" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- RACCOON — archetype 0 · The Impulse Spender (triangle raccoon).
       Exported from src/arena/sprites.jsx. Keep class names + viewBox;
       sp-main/dark/soft recolor from the user accent in the app;
       the tint here is the archetype color, preview-only.
       The sweat drop (squirrel) is hidden in-app until the idle2 animation. -->
  <style>
    svg { --spt: #ff375f; --spt-dark: color-mix(in srgb, #ff375f 66%, #231628); --spt-soft: color-mix(in srgb, #ff375f 62%, #fff); }
    .sp-main{fill:var(--spt)} .sp-dark{fill:var(--spt-dark)} .sp-soft{fill:var(--spt-soft)}
    .sp-white{fill:#fff} .sp-ink{fill:#2a2a30} .sp-shadow{fill:#000;opacity:.08}
    .sp-darkline{stroke:var(--spt-dark);fill:none;stroke-linecap:round}
    .sq-rim{stroke:var(--spt-dark)} .pc-ring{stroke:var(--spt-dark);fill:none}
    .sp-cash{fill:#43b96f} .sp-cash2{fill:#2f9d58} .sp-cashline{stroke:#2f9d58;fill:none}
    .sp-coin{fill:#f2b62c} .sp-coinline{stroke:#f8d977;fill:none}
    .sp-bag{fill:#8a5a34} .sp-bag2{fill:#66422a} .sp-bagline{stroke:#66422a;fill:none}
    .sp-sweat{fill:#7cc9f2;opacity:1}
  </style>
  <ellipse cx="60" cy="110" rx="34" ry="5.5" class="sp-shadow"/>
  <g class="sp-puppet">
      <g class="rc-tail">
        <circle cx="86" cy="93" r="9" class="sp-dark" />
        <circle cx="98" cy="90" r="7" class="sp-main" />
        <circle cx="107" cy="87" r="5.5" class="sp-dark" />
      </g>
      <rect x="40" y="98" width="15" height="9" rx="4.5" class="sp-dark" />
      <rect x="64" y="98" width="15" height="9" rx="4.5" class="sp-dark" />
      <path
        d="M53 19 Q60 9 67 19 L95 78 Q99 86 91 89.5 Q76 95 60 95 Q44 95 29 89.5 Q21 86 25 78 Z"
        class="sp-main"
      />
      <g class="rc-face">
        <rect x="25" y="41" width="70" height="25" rx="12.5" class="sp-dark" />
        <circle cx="45" cy="53.5" r="10.5" class="sp-white" />
        <circle cx="69" cy="53.5" r="10.5" class="sp-white" />
        <circle cx="48" cy="54.5" r="2.6" class="sp-ink" />
        <circle cx="66" cy="54.5" r="2.6" class="sp-ink" />
      </g>
      <path d="M54.5 71 Q60 76.5 65.5 71" class="sp-darkline" stroke-width="2.6" />
      <g class="rc-arm">
        <g transform="rotate(-18 58 83.5)">
          <rect x="45" y="75.5" width="26" height="15" rx="3" class="sp-cash" />
          <rect x="48.5" y="79" width="19" height="8" rx="2" class="sp-cashline" stroke-width="1.8" />
          <circle cx="58" cy="83" r="3.2" class="sp-cash2" />
        </g>
        <rect x="60" y="73.5" width="15" height="9.5" rx="4.75" class="sp-dark" transform="rotate(-35 67.5 78.25)" />
      </g>
    </g>
</svg>
