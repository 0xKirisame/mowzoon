<svg width="480" height="480" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- SQUIRREL — archetype 1 · The Anxious Planner (drop squirrel).
       Exported from src/arena/sprites.jsx. Keep class names + viewBox;
       sp-main/dark/soft recolor from the user accent in the app;
       the tint here is the archetype color, preview-only.
       The sweat drop (squirrel) is hidden in-app until the idle2 animation. -->
  <style>
    svg { --spt: #5e5ce6; --spt-dark: color-mix(in srgb, #5e5ce6 66%, #231628); --spt-soft: color-mix(in srgb, #5e5ce6 62%, #fff); }
    .sp-main{fill:var(--spt)} .sp-dark{fill:var(--spt-dark)} .sp-soft{fill:var(--spt-soft)}
    .sp-white{fill:#fff} .sp-ink{fill:#2a2a30} .sp-shadow{fill:#000;opacity:.08}
    .sp-darkline{stroke:var(--spt-dark);fill:none;stroke-linecap:round}
    .sq-rim{stroke:var(--spt-dark)} .pc-ring{stroke:var(--spt-dark);fill:none}
    .sp-cash{fill:#43b96f} .sp-cash2{fill:#2f9d58} .sp-cashline{stroke:#2f9d58;fill:none}
    .sp-coin{fill:#f2b62c} .sp-coinline{stroke:#f8d977;fill:none}
    .sp-bag{fill:#8a5a34} .sp-bag2{fill:#66422a} .sp-bagline{stroke:#66422a;fill:none}
    .sp-sweat{fill:#7cc9f2;opacity:1}
  </style>
  <ellipse cx="60" cy="110" rx="34" ry="5.5" class="sp-shadow"/>
  <g class="sp-puppet">
      <g class="sq-tail">
        <path d="M72 92 Q106 88 108 54 Q109 24 80 15 Q99 34 93 60 Q88 80 66 88 Z" class="sp-dark" />
      </g>
      <rect x="47" y="98" width="11" height="8" rx="4" class="sp-dark" />
      <rect x="62" y="98" width="11" height="8" rx="4" class="sp-dark" />
      <path
        d="M60 15 Q77 33 84 56 Q90 80 75 91 Q60 99 45 91 Q30 80 36 56 Q43 33 60 15 Z"
        class="sp-main"
      />
      <g class="sq-face">
        <circle cx="46" cy="52" r="12.5" class="sp-white sq-rim" stroke-width="4" />
        <circle cx="74" cy="52" r="12.5" class="sp-white sq-rim" stroke-width="4" />
        <rect x="57" y="50" width="6" height="3.5" rx="1.75" class="sp-dark" />
        <circle cx="50" cy="55" r="2.6" class="sp-ink sq-pupil" />
        <circle cx="78" cy="55" r="2.6" class="sp-ink sq-pupil" />
      </g>
      <rect x="56" y="70.5" width="8" height="2.6" rx="1.3" class="sp-dark" />
      <g class="sq-hold">
        <circle cx="60" cy="84" r="14.5" class="sp-coin" />
        <circle cx="60" cy="84" r="9.5" class="sp-coinline" stroke-width="3" />
        <rect x="38" y="73" width="15" height="8.5" rx="4.25" class="sp-soft" transform="rotate(33 45.5 77.25)" />
        <rect x="67" y="73" width="15" height="8.5" rx="4.25" class="sp-soft" transform="rotate(-33 74.5 77.25)" />
      </g>
      <path d="M33 22 Q37.5 29 33 32.5 Q28.5 29 33 22 Z" class="sp-sweat sq-sweat" />
    </g>
</svg>
