<svg width="480" height="480" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- CAMEL — archetype 3 · The Survivalist (rectangle camel).
       Exported from src/arena/sprites.jsx. Keep class names + viewBox;
       sp-main/dark/soft recolor from the user accent in the app;
       the tint here is the archetype color, preview-only.
       The sweat drop (squirrel) is hidden in-app until the idle2 animation. -->
  <style>
    svg { --spt: #0fa38f; --spt-dark: color-mix(in srgb, #0fa38f 66%, #231628); --spt-soft: color-mix(in srgb, #0fa38f 62%, #fff); }
    .sp-main{fill:var(--spt)} .sp-dark{fill:var(--spt-dark)} .sp-soft{fill:var(--spt-soft)}
    .sp-white{fill:#fff} .sp-ink{fill:#2a2a30} .sp-shadow{fill:#000;opacity:.08}
    .sp-darkline{stroke:var(--spt-dark);fill:none;stroke-linecap:round}
    .sq-rim{stroke:var(--spt-dark)} .pc-ring{stroke:var(--spt-dark);fill:none}
    .sp-cash{fill:#43b96f} .sp-cash2{fill:#2f9d58} .sp-cashline{stroke:#2f9d58;fill:none}
    .sp-coin{fill:#f2b62c} .sp-coinline{stroke:#f8d977;fill:none}
    .sp-bag{fill:#8a5a34} .sp-bag2{fill:#66422a} .sp-bagline{stroke:#66422a;fill:none}
    .sp-sweat{fill:#7cc9f2;opacity:1}
  </style>
  <ellipse cx="60" cy="110" rx="34" ry="5.5" class="sp-shadow"/>
  <g class="sp-puppet">
      <rect x="42" y="80" width="11" height="26" rx="5.5" class="sp-main" />
      <rect x="55" y="82" width="11" height="24" rx="5.5" class="sp-dark" />
      <rect x="76" y="80" width="11" height="26" rx="5.5" class="sp-main" />
      <rect x="89" y="82" width="11" height="24" rx="5.5" class="sp-dark" />
      <circle cx="60" cy="50" r="12" class="sp-dark" />
      <circle cx="82" cy="50" r="12" class="sp-dark" />
      <rect x="36" y="52" width="58" height="34" rx="9" class="sp-main" />
      <g class="cm-head">
        <rect x="24" y="28" width="15" height="38" rx="7.5" class="sp-main" />
        <rect x="4" y="20" width="32" height="19" rx="8" class="sp-main" />
        <rect x="13" y="26" width="7" height="2.6" rx="1.3" class="sp-dark" />
        <rect x="23" y="26" width="7" height="2.6" rx="1.3" class="sp-dark" />
        <rect x="6" y="33" width="6.5" height="2.4" rx="1.2" class="sp-dark" />
      </g>
      <g class="cm-bag">
        <ellipse cx="76" cy="66" rx="14" ry="20" class="sp-bagline" stroke-width="5" />
        <rect x="70" y="44" width="16" height="10" rx="5" class="sp-bagline" stroke-width="4.5" />
        <rect x="58" y="52" width="36" height="26" rx="5" class="sp-bag" />
        <rect x="58" y="61" width="36" height="7" class="sp-bag2" />
        <rect x="65" y="55" width="5" height="20" rx="2" class="sp-bag2" />
        <rect x="85" y="55" width="5" height="20" rx="2" class="sp-bag2" />
      </g>
    </g>
</svg>
